services:

  # Modo STDIO — usado pelos IDEs (Windsurf, Claude Desktop, etc.)
  mcp-oracle:
    container_name: mcp-oracle-server
    build: .
    env_file:
      - .env
    stdin_open: true # needed for stdio transport
    tty: true        # needed for stdio transport
    restart: unless-stopped

  # Modo HTTP — expõe endpoint Streamable HTTP para MCP Inspector e clientes REST
  mcp-oracle-http:
    container_name: mcp-oracle-http
    build: .
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3000"
    ports:
      - "3100:3000"
    restart: unless-stopped
